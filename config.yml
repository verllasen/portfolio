# =============================================================================
# CORSO — настройки бота (config.yml)
# =============================================================================
# ID канала/роли: Discord → Настройки → Расширенные → Режим разработчика
# → ПКМ по каналу/роли → «Копировать идентификатор».
# =============================================================================

# ID сервера. Если 0 — слэш-команды синхронизируются глобально (медленнее).
guild_id: 0

# Канал панели контрактов по !setup_post (0 = панель в канале, где вызвали команду).
contracts_channel_id: 0

# Отчёты по контрактам на проверку (фото + «Принять / Отклонить»).
review_channel_id: 1491997601996869864

# Уведомления о выплатах после принятия отчёта.
payouts_channel_id: 0

# ---------------------------------------------------------------------------
# АУДИТ И УВЕДОМЛЕНИЯ УЧАСТНИКОВ (разные каналы под разные типы логов)
# ---------------------------------------------------------------------------

# Кто / когда выдал или снял роль; смена ника на сервере; таймаут (мут); разбан.
audit_roles_channel_id: 1491402018089337053

# Удалённые и отредактированные сообщения (текст берётся из кэша бота — старые сообщения после рестарта могут быть без текста).
audit_messages_channel_id: 1491402776847192177

# Краткий аудит входа: кто зашёл, когда, кем приглашён, инвайт, счётчик использований.
audit_join_channel_id: 1491402942220337272

# Подробное уведомление о новом участнике (карточка для главсостава).
member_welcome_channel_id: 1485381483991666812

# Выход самостоятельно, кик или бан (бот пытается отличить по журналу аудита).
member_leave_channel_id: 1485730013209694260

# Логи голосовой активности (зашёл/вышел + время в канале).
voice_activity_log_channel_id: 1491402722635939870

# Подробные серверные логи: создание/изменение/удаление каналов и ролей, права доступа.
server_audit_channel_id: 1491402509791662211

# ---------------------------------------------------------------------------
# ПОВЫШЕНИЕ
# ---------------------------------------------------------------------------

# Канал, из которого можно вызвать !setup_promotion (дополнительно разрешён promotion_public_channel_id).
promotion_setup_command_channel_id: 1485716918584475842

# Публичный канал: сюда публикуется панель «оставить заявку на повышение». Команду !setup_promotion можно вызвать и отсюда, и из promotion_setup_command_channel_id.
promotion_public_channel_id: 1485700672216367144

# Канал главсостава: сюда падают заявки на повышение с кнопками решения.
promotion_review_channel_id: 1495535957309653202

# ---------------------------------------------------------------------------
# ЗАЯВКИ В СЕМЬЮ
# ---------------------------------------------------------------------------

# Сюда падают заявки с кнопками (в т.ч. «Взять на рассмотрение» → в ЛС кандидату уходят ссылки на family_review_voice_channel_ids).
# Панель с кнопкой «Подать заявку» публикуется командой !setup_family в нужном вам канале.
family_application_review_channel_id: 1495534224411856986

# Голосовые каналы для обзвона: при кнопке «Взять на рассмотрение» по заявке в семью кандидату в ЛС уйдут ссылки на эти войсы.
family_review_voice_channel_ids:
  - 1485722814999691405
  - 1485722862588526835

